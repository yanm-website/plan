<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>жИСзЪДдЇСзЂѓжЧ•з®Л App</title>
    <style>
        /* 1. жБҐе§НпЉЪеЕ®е±Аж†ЈеЉПдЄОиГМжЩѓ */
        body { background-color: #d8d8d8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* 2. жБҐе§НпЉЪдЄїеН°зЙЗдЄОжОТзЙИ */
        .main-card { background: #ffffff; border-radius: 24px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); width: 90%; max-width: 500px; padding: 40px; position: relative; }
        .status-badge { background: #000; color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        .task-title { font-size: 32px; font-weight: 800; color: #000; margin-bottom: 10px; line-height: 1.2; }
        .task-info { color: #666; font-size: 16px; margin-bottom: 30px; display: flex; gap: 15px; }
        
        /* 3. жБҐе§НпЉЪжЦЬжЭ†ињЫеЇ¶жЭ°ж†ЈеЉП */
        .progress-container { margin-top: 40px; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: #000; width: 0%; transition: width 0.5s ease; }
        .progress-text { display: flex; justify-content: space-between; margin-top: 10px; font-family: monospace; font-size: 14px; color: #999; }

        /* 4. жБҐе§НпЉЪжµЃеК®еК†еПЈ */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.3s; z-index: 100; }
        .fab:active { transform: scale(0.9); }

        /* 5. жБҐе§НпЉЪжЦ∞еҐЮйЭҐжЭњпЉИModalпЉЙ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 85%; max-width: 380px; position: relative; min-height: 400px; }
        .modal-content h3 { margin-top: 0; font-size: 20px; font-weight: 800; }
        
        /* 6. иЊУеЕ•ж°Жж†ЈеЉП */
        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 12px; color: #999; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; font-size: 14px; box-sizing: border-box; background: #fafafa; }

        /* 7. жЩЇиГљиБФжГ≥еИЧи°®ж†ЈеЉП */
        .suggestion-list { position: absolute; background: white; border: 1px solid #eee; border-radius: 0 0 12px 12px; max-height: 150px; overflow-y: auto; width: 100%; z-index: 1001; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: none; }
        .suggestion-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; display: flex; justify-content: space-between; font-size: 14px; }
        .suggestion-item:hover { background-color: #f0f0f0; }
        .suggestion-count { color: #ccc; font-size: 11px; }

        /* 8. вЬУ еТМ вЬХ жМЙйФЃеЃЪдљН */
        .modal-footer { display: flex; justify-content: space-between; position: absolute; bottom: 30px; left: 30px; right: 30px; }
        .btn-icon { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn-cancel { background: #f5f5f5; color: #999; } /* вЬХ */
        .btn-save { background: #000; color: #fff; }    /* вЬУ */
        .btn-icon:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="status-badge" class="status-badge">---</div>
        <div class="task-title" id="display-title">еК†иљљдЄ≠...</div>
        <div class="task-info">
            <span id="display-time">--:--</span>
            <span id="display-location">---</span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="pb"></div></div>
            <div class="progress-text">
                <span>PROGRESS</span>
                <span id="pt">0/100</span>
            </div>
        </div>
    </div>

    <div class="fab" onclick="openModal()">+</div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h3>NEW PLAN</h3>
            
            <div class="input-group">
                <label>дїїеК°еРНзІ∞</label>
                <input type="text" id="taskName" placeholder="дЊЛе¶В: Engineering Mathematics" oninput="handleInput(this)" autocomplete="off">
                <div id="suggestionBox" class="suggestion-list"></div>
            </div>

            <div class="input-group">
                <label>дїїеК°з±їеЮЛ</label>
                <select id="taskType">
                    <option value="Learning">рЯУЦ е≠¶дє† (Academic)</option>
                    <option value="Creative">вЬНпЄП еИЫдљЬ (Creative)</option>
                    <option value="Life">рЯП† зФЯжії (Life)</option>
                    <option value="Entertainment">рЯОЃ е®±дєР (Game)</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>еЉАеІЛжЧґйЧі</label>
                    <input type="time" id="taskTime">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>еЬ∞зВє</label>
                    <input type="text" id="taskLocation" placeholder="е¶В: APU Library">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-icon btn-cancel" onclick="closeModal()">вЬХ</button>
                <button class="btn-icon btn-save" onclick="saveTask()">вЬУ</button>
            </div>
        </div>
    </div>

    <script>
        // ======= еЕ≥йФЃйЕНзљЃпЉЪиѓЈе°ЂеЕ•дљ†зЪДдњ°жБѓ =======
        const BIN_ID = '69f966eeaaba8821977110ff'; 
        const API_KEY = '$2a$10$wMi0hs1j8z3avrDPrAIDEeBxC15MlrFUV9SIdKMxtYwQHKCw76GDy';
        // =====================================

        let allTasks = [];

        async function loadData() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                allTasks = data.record.tasks || [];
                updateDisplay();
            } catch (err) { console.error("еК†иљље§±иі•", err); }
        }

        // жЩЇиГљиБФжГ≥ж†ЄењГйАїиЊС
        function handleInput(input) {
            const val = input.value.toLowerCase();
            const box = document.getElementById('suggestionBox');
            if (!val) { box.style.display = 'none'; return; }

            const oneMonthAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
            const stats = allTasks.reduce((acc, task) => {
                const taskTime = new Date(task.createdAt || 0).getTime();
                if (task.name.toLowerCase().includes(val) && taskTime > oneMonthAgo) {
                    acc[task.name] = (acc[task.name] || 0) + 1;
                }
                return acc;
            }, {});

            const sorted = Object.keys(stats).sort((a, b) => stats[b] - stats[a]);

            if (sorted.length > 0) {
                box.innerHTML = sorted.map(name => `
                    <div class="suggestion-item" onclick="selectSuggestion('${name}')">
                        <span>${name}</span>
                        <span class="suggestion-count">${stats[name]}жђ°</span>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        }

        function selectSuggestion(name) {
            document.getElementById('taskName').value = name;
            document.getElementById('suggestionBox').style.display = 'none';
        }

        function openModal() { document.getElementById('taskModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

        async function saveTask() {
            const name = document.getElementById('taskName').value;
            const type = document.getElementById('taskType').value;
            const time = document.getElementById('taskTime').value;
            const loc = document.getElementById('taskLocation').value;

            if (!name || !time) { alert("иѓЈе°ЂеЖЩеРНзІ∞еТМжЧґйЧі"); return; }

            const newTask = { 
                name, type, time, 
                location: loc || "Anywhere", 
                createdAt: new Date().toISOString() 
            };
            allTasks.push(newTask);

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ tasks: allTasks })
            });

            closeModal();
            updateDisplay();
        }

        function updateDisplay() {
            if (allTasks.length > 0) {
                const latest = allTasks[allTasks.length - 1];
                document.getElementById('display-title').innerText = latest.name;
                document.getElementById('display-time').innerText = latest.time;
                document.getElementById('display-location').innerText = "@ " + latest.location;
                document.getElementById('status-badge').innerText = latest.type.toUpperCase();
                
                // ж®°жЛЯдЄАдЄ™ињЫеЇ¶
                const randomProgress = Math.floor(Math.random() * 40) + 60;
                document.getElementById('pb').style.width = randomProgress + '%';
                document.getElementById('pt').innerText = randomProgress + ' / 100';
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
