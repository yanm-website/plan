<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属日程规划</title>
    <style>
        /* 全局黑白极简风格 */
        body { background-color: #d8d8d8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; min-height: 100vh; overflow-x: hidden; }

        /* 四角悬浮按钮 */
        .corner-btn { position: fixed; width: 60px; height: 60px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); cursor: pointer; z-index: 100; transition: transform 0.2s; border: none; }
        .corner-btn:active { transform: scale(0.9); }
        .btn-tl { top: 30px; left: 30px; } /* 左上角 */
        .btn-tr { top: 30px; right: 30px; } /* 右上角: 搜索 */
        .btn-bl { bottom: 30px; left: 30px; background: #fff; color: #000; border: 2px solid #eee; } /* 左下角 */
        .btn-br { bottom: 30px; right: 30px; font-size: 35px; } /* 右下角: 新增 */

        /* 灵动岛搜索栏 */
        .dynamic-island { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; background: #000; color: #fff; border-radius: 30px; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .dynamic-island.active { top: 40px; }
        .dynamic-island input { background: transparent; border: none; color: #fff; font-size: 16px; outline: none; width: 100%; }
        .dynamic-island input::placeholder { color: #888; }

        /* 白板主容器 */
        .main-board { max-width: 900px; margin: 80px auto; padding-bottom: 100px; }

        /* 日期分组 Header */
        .date-header { font-size: 24px; font-weight: 800; color: #111; margin: 40px 0 20px 10px; display: flex; align-items: center; }
        .date-header::before { content: ""; display: block; width: 6px; height: 24px; background: #000; margin-right: 15px; border-radius: 3px; }

        /* 固定尺寸网格卡片 */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .task-card { background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        .task-type { font-size: 12px; font-weight: bold; padding: 5px 12px; background: #eee; border-radius: 12px; display: inline-block; margin-bottom: 15px; color: #555; }
        .task-card-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #000; line-height: 1.3; }
        .task-card-info { font-size: 14px; color: #888; display: flex; flex-direction: column; gap: 8px; font-family: monospace; }

        /* 模态框与极简排版 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 40px; border-radius: 25px; width: 85%; max-width: 400px; position: relative; } /* 设置 relative 为破形对齐做准备 */
        .modal-title { font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; background: #f9f9f9; outline: none; box-sizing: border-box; }
        .input-group input:focus, .input-group select:focus { border-color: #000; }
        .flex-row { display: flex; gap: 15px; }

        /* 🔥 核心灵魂：破形对齐的 ✓ 和 ✕ */
        .broken-btn { position: absolute; bottom: 0; width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .broken-btn:active { transform: scale(0.9) !important; }
        
        /* ✕ 左下角圆心对齐顶点 */
        .btn-cancel-broken { left: 0; background: #fff; color: #000; border: 2px solid #ddd; transform: translate(-30%, 30%); }
        
        /* ✓ 右下角圆心对齐顶点 */
        .btn-save-broken { right: 0; background: #000; color: #fff; transform: translate(30%, 30%); }

    </style>
</head>
<body>

    <button class="corner-btn btn-tl" onclick="alert('菜单功能已就绪')">☰</button>
    <button class="corner-btn btn-tr" onclick="toggleSearch()">🔍</button>
    <button class="corner-btn btn-bl" onclick="loadData()">↻</button>
    <button class="corner-btn btn-br" onclick="openModal()">+</button>

    <div class="dynamic-island" id="searchIsland">
        <input type="text" id="searchInput" placeholder="搜索任务..." onkeyup="searchTasks()">
        <span style="cursor: pointer;" onclick="toggleSearch()">✕</span>
    </div>

    <div class="main-board" id="board-container">
        </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h3 class="modal-title">NEW PLAN</h3>
            
            <div class="input-group">
                <label>Task Name</label>
                <input type="text" id="taskName" placeholder="例如: Engineering Mathematics">
            </div>

            <div class="input-group">
                <label>Category</label>
                <select id="taskType">
                    <option value="Learning">📖 学习 (Learning)</option>
                    <option value="Creative">✍️ 创作 (Creative)</option>
                    <option value="Life">🏠 生活 (Life)</option>
                    <option value="Game">🎮 娱乐 (Game)</option>
                </select>
            </div>

            <div class="flex-row">
                <div class="input-group" style="flex: 1;">
                    <label>Date</label>
                    <input type="date" id="taskDate">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Time</label>
                    <input type="time" id="taskTime">
                </div>
            </div>

            <div class="input-group">
                <label>Location</label>
                <input type="text" id="taskLocation" placeholder="如: APU Library">
            </div>

            <button class="broken-btn btn-cancel-broken" onclick="closeModal()">✕</button>
            <button class="broken-btn btn-save-broken" onclick="saveTask()">✓</button>
        </div>
    </div>

    <script>
        // ====== 请填入你之前的密钥 ======
        const BIN_ID = '69f966eeaaba8821977110ff'; 
        const API_KEY = '$2a$10$wMi0hs1j8z3avrDPrAIDEeBxC15MlrFUV9SIdKMxtYwQHKCw76GDy';
        // ==============================

        let allTasks = [];

        // 设置默认日期为今天
        document.getElementById('taskDate').valueAsDate = new Date();

        async function loadData() {
            document.getElementById('board-container').innerHTML = '<h2 style="text-align:center; margin-top:50px;">正在从云端同步...</h2>';
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                allTasks = data.record.tasks || [];
                renderTasks(allTasks);
            } catch (err) { 
                console.error("加载失败", err);
                document.getElementById('board-container').innerHTML = '<h2 style="text-align:center;">同步失败，请检查密钥</h2>';
            }
        }

        // 核心渲染逻辑：按日期分组 + 网格布局
        function renderTasks(tasksToRender) {
            const board = document.getElementById('board-container');
            board.innerHTML = '';

            if (tasksToRender.length === 0) {
                board.innerHTML = '<h2 style="text-align:center; color:#888; margin-top:100px;">暂无计划，点击右下角添加</h2>';
                return;
            }

            // 按日期将任务分类
            const groupedTasks = tasksToRender.reduce((groups, task) => {
                const date = task.date || '未分类日期';
                if (!groups[date]) groups[date] = [];
                groups[date].push(task);
                return groups;
            }, {});

            // 按日期倒序排列（最新的在最上面）
            const sortedDates = Object.keys(groupedTasks).sort((a, b) => new Date(b) - new Date(a));

            sortedDates.forEach(date => {
                // 生成 Header
                const header = document.createElement('div');
                header.className = 'date-header';
                header.innerText = date;
                board.appendChild(header);

                // 生成网格容器
                const grid = document.createElement('div');
                grid.className = 'task-grid';

                // 填充网格卡片
                groupedTasks[date].forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.innerHTML = `
                        <div class="task-type">${task.type}</div>
                        <div class="task-card-title">${task.name}</div>
                        <div class="task-card-info">
                            <span>🕒 ${task.time || '--:--'}</span>
                            <span>📍 ${task.location || '未定'}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                board.appendChild(grid);
            });
        }

        // 灵动岛搜索逻辑
        function toggleSearch() {
            const island = document.getElementById('searchIsland');
            island.classList.toggle('active');
            if(island.classList.contains('active')) {
                document.getElementById('searchInput').focus();
            }
        }

        function searchTasks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTasks.filter(t => t.name.toLowerCase().includes(query) || (t.location && t.location.toLowerCase().includes(query)));
            renderTasks(filtered);
        }

        function openModal() { document.getElementById('taskModal').style.display = 'flex'; }
        
        function closeModal() { 
            document.getElementById('taskModal').style.display = 'none'; 
            document.getElementById('taskName').value = '';
        }

        async function saveTask() {
            const name = document.getElementById('taskName').value;
            const type = document.getElementById('taskType').options[document.getElementById('taskType').selectedIndex].text;
            const date = document.getElementById('taskDate').value;
            const time = document.getElementById('taskTime').value;
            const loc = document.getElementById('taskLocation').value;

            if (!name) { alert("任务名称不能为空！"); return; }

            const newTask = { name, type, date, time, location: loc, createdAt: new Date().toISOString() };
            allTasks.push(newTask);

            closeModal();
            renderTasks(allTasks); // 本地先更新，提供秒级交互感

            // 后台同步到云端
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ tasks: allTasks })
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
