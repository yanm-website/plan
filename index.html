<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能日程规划</title>
    <style>
        /* 基础样式保持你喜欢的风格 */
        body { background-color: #d8d8d8; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .main-card { background: #ffffff; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); width: 90%; max-width: 800px; min-height: 400px; padding: 50px 40px; position: relative; }
        
        /* 联想列表专用样式 */
        .suggestion-list {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            width: calc(100% - 2px);
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none;
        }
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .suggestion-item:hover { background-color: #f5f5f5; }
        .suggestion-count { color: #888; font-size: 0.8em; }

        /* 其他原有样式省略，保持一致... */
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="task-container">
            <!-- 任务显示区域 -->
            <div class="status-badge status-active">进行中</div>
            <div class="task-title" id="display-title">等待加载...</div>
            <div class="task-time" id="display-time">--:--</div>
        </div>
    </div>

    <div class="fab" onclick="openModal()">+</div>

    <!-- 新增任务面板 -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h3>新增计划</h3>
            <div class="input-group">
                <input type="text" id="taskName" placeholder="任务名称 (例如: Engineering Mathematics)" oninput="handleInput(this)" autocomplete="off">
                <div id="suggestionBox" class="suggestion-list"></div>
            </div>
            <input type="time" id="taskTime" style="margin-bottom: 20px;">
            <button onclick="saveTask()" style="width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px;">保存计划</button>
            <button onclick="closeModal()" style="width: 100%; padding: 10px; background: none; border: none; color: #666; margin-top: 10px;">取消</button>
        </div>
    </div>

    <script>
        // 配置你的 JSONBin 信息
        const BIN_ID = '69f966eeaaba8821977110ff'; 
        const API_KEY = '$2a$10$wMi0hs1j8z3avrDPrAIDEeBxC15MlrFUV9SIdKMxtYwQHKCw76GDy';
        let allTasks = [];

        // 获取数据
        async function loadData() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                allTasks = data.record.tasks || [];
                updateDisplay();
            } catch (err) { console.error("加载失败", err); }
        }

        // 智能联想核心逻辑
        function handleInput(input) {
            const val = input.value.toLowerCase();
            const box = document.getElementById('suggestionBox');
            
            if (!val) {
                box.style.display = 'none';
                return;
            }

            // 1. 提取并过滤：一个月内的任务 + 名称匹配
            const oneMonthAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
            
            const stats = allTasks.reduce((acc, task) => {
                const taskTime = new Date(task.createdAt || 0).getTime();
                if (task.name.toLowerCase().includes(val) && taskTime > oneMonthAgo) {
                    acc[task.name] = (acc[task.name] || 0) + 1;
                }
                return acc;
            }, {});

            // 2. 排序：按频率从高到低
            const sorted = Object.keys(stats).sort((a, b) => stats[b] - stats[a]);

            if (sorted.length > 0) {
                box.innerHTML = sorted.map(name => `
                    <div class="suggestion-item" onclick="selectSuggestion('${name}')">
                        <span>${name}</span>
                        <span class="suggestion-count">${stats[name]}次</span>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }

        function selectSuggestion(name) {
            document.getElementById('taskName').value = name;
            document.getElementById('suggestionBox').style.display = 'none';
        }

        function openModal() { document.getElementById('taskModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

        async function saveTask() {
            const name = document.getElementById('taskName').value;
            const time = document.getElementById('taskTime').value;
            if (!name || !time) return;

            const newTask = { name, time, createdAt: new Date().toISOString() };
            allTasks.push(newTask);

            // 存入云端
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ tasks: allTasks })
            });

            closeModal();
            updateDisplay();
        }

        function updateDisplay() {
            if (allTasks.length > 0) {
                const latest = allTasks[allTasks.length - 1];
                document.getElementById('display-title').innerText = latest.name;
                document.getElementById('display-time').innerText = latest.time;
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
