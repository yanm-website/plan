<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属日程规划</title>
    <style>
        /* 基础背景与字体 */
        body { background-color: #d8d8d8; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }

        /* 主白板排版 */
        .main-card { background: #ffffff; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); width: 90%; max-width: 800px; min-height: 400px; padding: 50px 40px; position: relative; }

        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 30px; font-size: 1.2em; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }
        .status-active { background-color: #e8f5e9; color: #2e7d32; border: 2px solid #c8e6c9; }
        
        .task-title { font-size: 3.5em; font-weight: bold; color: #111; margin-bottom: 10px; word-wrap: break-word; line-height: 1.2; width: 100%; }
        .task-time { font-size: 1.8em; color: #444; margin: 5px 0; font-weight: bold; display: block; }
        .task-location { font-size: 1.5em; color: #888; display: block; margin-bottom: 30px; }

        /* 专属斜杠进度条 */
        .progress-container { margin-top: 50px; }
        .progress-bar { width: 100%; height: 12px; background-color: #f0f0f0; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: repeating-linear-gradient( 45deg, #000, #000 15px, #333 15px, #333 30px ); width: 0%; transition: width 0.5s ease-in-out; }
        .progress-text { display: flex; justify-content: space-between; margin-top: 15px; font-size: 1.1em; color: #666; font-weight: bold; font-family: monospace; }

        /* 右下角悬浮加号 */
        .fab { position: fixed; bottom: 40px; right: 40px; width: 70px; height: 70px; background-color: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.2s; z-index: 100; }
        .fab:active { transform: scale(0.9); }

        /* 弹窗及内部排版 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 40px; border-radius: 25px; width: 85%; max-width: 450px; position: relative; }
        .modal-content h3 { margin-top: 0; font-size: 1.8em; font-weight: bold; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 1.1em; color: #555; margin-bottom: 8px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1.1em; box-sizing: border-box; background: #fafafa; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: #000; }

        .flex-row { display: flex; gap: 15px; }
        .flex-row .input-group { flex: 1; }

        /* 底部左右分布的圆圈按钮：✓ 和 ✕ */
        .modal-footer { display: flex; justify-content: space-between; margin-top: 35px; }
        .btn-icon { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-cancel { background: #fff; color: #000; border: 2px solid #eee; }
        .btn-save { background: #000; color: #fff; }
        .btn-icon:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="status-badge" class="status-badge status-active">LOADING...</div>
        <div class="task-title" id="display-title">等待同步...</div>
        <div class="task-time" id="display-time">--:--</div>
        <div class="task-location" id="display-location">@ ---</div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="pb"></div>
            </div>
            <div class="progress-text">
                <span>PROGRESS</span>
                <span id="pt">0/100</span>
            </div>
        </div>
    </div>

    <!-- 唤醒弹窗的按钮 -->
    <div class="fab" onclick="openModal()">+</div>

    <!-- 新增计划面板 -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h3>NEW PLAN</h3>
            
            <div class="input-group">
                <label>任务名称</label>
                <input type="text" id="taskName" placeholder="输入任务名称...">
            </div>

            <div class="input-group">
                <label>任务类型</label>
                <select id="taskType">
                    <option value="Learning">📖 学习 (Learning)</option>
                    <option value="Creative">✍️ 创作 (Creative)</option>
                    <option value="Life">🏠 生活 (Life)</option>
                    <option value="Entertainment">🎮 娱乐 (Entertainment)</option>
                </select>
            </div>

            <div class="flex-row">
                <div class="input-group">
                    <label>开始时间</label>
                    <input type="time" id="taskTime">
                </div>
                <div class="input-group">
                    <label>地点</label>
                    <input type="text" id="taskLocation" placeholder="输入地点...">
                </div>
            </div>

            <!-- 原汁原味的 ✕ 和 ✓ 按键 -->
            <div class="modal-footer">
                <button class="btn-icon btn-cancel" onclick="closeModal()">✕</button>
                <button class="btn-icon btn-save" onclick="saveTask()">✓</button>
            </div>
        </div>
    </div>

    <script>
        // ======= 这里必须替换成你的 =======
        const BIN_ID = '69f966eeaaba8821977110ff'; 
        const API_KEY = '$2a$10$wMi0hs1j8z3avrDPrAIDEeBxC15MlrFUV9SIdKMxtYwQHKCw76GDy';
        // ===================================
        
        let allTasks = [];

        async function loadData() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                allTasks = data.record.tasks || [];
                updateDisplay();
            } catch (err) { 
                console.error("加载失败", err); 
                document.getElementById('display-title').innerText = "数据同步失败";
            }
        }

        function openModal() { document.getElementById('taskModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

        async function saveTask() {
            const name = document.getElementById('taskName').value;
            const type = document.getElementById('taskType').value;
            const time = document.getElementById('taskTime').value;
            const loc = document.getElementById('taskLocation').value;

            if (!name || !time) { alert("请填写任务名称和时间！"); return; }

            const newTask = { 
                name, type, time, 
                location: loc || "未定", 
                createdAt: new Date().toISOString() 
            };
            allTasks.push(newTask);

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ tasks: allTasks })
            });

            // 保存后自动清空输入框
            document.getElementById('taskName').value = '';
            document.getElementById('taskTime').value = '';
            document.getElementById('taskLocation').value = '';

            closeModal();
            updateDisplay();
        }

        function updateDisplay() {
            if (allTasks.length > 0) {
                const latest = allTasks[allTasks.length - 1];
                document.getElementById('display-title').innerText = latest.name;
                document.getElementById('display-time').innerText = latest.time;
                document.getElementById('display-location').innerText = "@ " + latest.location;
                
                const typeMap = {
                    "Learning": "LEARNING",
                    "Creative": "CREATIVE",
                    "Life": "LIFE",
                    "Entertainment": "ENTERTAINMENT"
                };
                document.getElementById('status-badge').innerText = typeMap[latest.type] || "TASK";
                
                // 恢复进度条的动画逻辑
                const randomProgress = Math.floor(Math.random() * 40) + 60;
                document.getElementById('pb').style.width = randomProgress + '%';
                document.getElementById('pt').innerText = randomProgress + ' / 100';
            } else {
                document.getElementById('display-title').innerText = "暂无任务";
                document.getElementById('status-badge').innerText = "EMPTY";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
